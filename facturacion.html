<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturación Medios — Kuarzo</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f7fa;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;--accent:#4f6ef7;--accent2:#7c3aed;--text:#1a202c;--muted:#64748b;--green:#10b981;--red:#ef4444;--gold:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,#ffffff,#f0f4ff 50%,#f5f0ff);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:var(--accent);text-decoration:none;font-size:.82rem;font-weight:600}
.header a:hover{text-decoration:underline}

.tabs{display:flex;gap:3px;padding:14px 32px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:9px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text);background:#f8fafc}
.tab.active{color:var(--accent2);background:var(--bg);border-color:var(--border)}

.content{padding:24px 32px;max-width:1440px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block}

.section-title{font-size:1.1rem;font-weight:700;margin:24px 0 14px;display:flex;align-items:center;gap:8px}
.section-title .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem}
.section-title .icon.tv{background:#3b82f6}
.section-title .icon.stream{background:#8b5cf6}
.section-title .icon.cable{background:#06b6d4}
.section-title .icon.radio{background:#f59e0b}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:18px}
.card-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:.85rem;font-weight:700}
.card-cnt{font-size:.72rem;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:10px}

.search-w{padding:10px 14px;border-bottom:1px solid var(--border)}
.search-w input{width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:.82rem;outline:none}
.search-w input:focus{border-color:var(--accent)}

.tw{overflow-y:auto;max-height:500px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{position:sticky;top:0;background:#f8fafc;padding:8px 13px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(79,110,247,.04)}
tbody td{padding:7px 13px}
td.name{font-weight:500}
td.num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
td.money{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--green)}
td.rank{font-weight:700;color:var(--accent);width:34px}
tr.r1 td.rank{color:var(--gold)}
tr.r2 td.rank{color:var(--muted)}
tr.r3 td.rank{color:#b45309}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-value{font-size:1.2rem;font-weight:700}

/* Monitor expandable */
.mon-group{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mon-hdr{padding:11px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.mon-hdr:hover{background:rgba(79,110,247,.04)}
.mon-name{font-weight:700;font-size:.82rem}
.mon-stats{font-size:.78rem;color:var(--muted);display:flex;gap:14px}
.mon-stats span{display:flex;align-items:center;gap:4px}
.mon-tog{color:var(--muted);font-size:.68rem;transition:transform .2s}
.mon-group.open .mon-tog{transform:rotate(180deg)}
.mon-body{display:none;border-top:1px solid var(--border)}
.mon-group.open .mon-body{display:block}
.mon-tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.mon-tbl tr{border-bottom:1px solid var(--border)}
.mon-tbl tr:last-child{border:none}
.mon-tbl td{padding:6px 15px}
.mon-tbl td.pr{width:26px;color:var(--accent);font-weight:700}
.mon-tbl td.pa{text-align:right;color:var(--muted);font-weight:600}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

.chart-c{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chart-c canvas{max-height:280px}
.chart-t{font-size:.88rem;font-weight:700;margin-bottom:12px}

/* Login */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:90%;max-width:420px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
</style>
</head>

const fmt=n=>{if(n>=1e9)return '$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return '$'+(n/1e3).toFixed(0)+'K';return '$'+Math.round(n).toLocaleString('es-AR')};
const fmtN=n=>n.toLocaleString('es-AR');
const fmtVar=v=>{const c=v>0?'var(--green)':v<0?'var(--red)':'var(--muted)';const s=v>0?'+':'';return `<span style="color:${c};font-weight:600">${s}${v}%</span>`};

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',t.textContent.includes(
    id==='costos'?'Costos':id==='monitor-tv'?'TV Aire':id==='monitor-cable'?'TV Cable':'Radios'
  )));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tc-'+id));
}

function filterTable(tbodyId, q){
  const tb=document.getElementById(tbodyId);if(!tb)return;
  q=q.toLowerCase();
  Array.from(tb.rows).forEach(r=>{r.style.display=r.cells[1].textContent.toLowerCase().includes(q)?'':'none'});
}

function toggleMon(el){el.classList.toggle('open')}

function buildCostos(){
  const f=DATA.facturacion;
  let h='';
  
  // TV Programs
  h+='<div class="section-title"><div class="icon tv">TV</div>TV por Programa — PNTs</div>';
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Comparación Enero vs Febrero 2026</div><span class="card-cnt">'+f.tv_programas.length+' programas</span></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Programa</th><th>PNTs Ene</th><th>Inv. Enero</th><th>PNTs Feb</th><th>Inv. Febrero</th><th>Var.</th><th>Valor/Salida</th></tr></thead><tbody id="tb-tv">';
  f.tv_programas.sort((a,b)=>b.inv_feb-a.inv_feb).forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    h+=`<tr class="${rc}"><td class="rank">${i+1}</td><td class="name">${p.nombre}</td><td class="num">${fmtN(p.pnts_ene)}</td><td class="money">${fmt(p.inv_ene)}</td><td class="num">${fmtN(p.pnts_feb)}</td><td class="money">${fmt(p.inv_feb)}</td><td class="num">${fmtVar(p.var_inv)}</td><td class="money">${fmt(p.valor_salida)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';

  // Streaming
  h+='<div class="section-title"><div class="icon stream">S</div>Streaming — PNTs</div>';
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Comparación Enero vs Febrero 2026</div><span class="card-cnt">'+f.streaming.length+' plataformas</span></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Plataforma</th><th>PNTs Ene</th><th>Inv. Enero</th><th>PNTs Feb</th><th>Inv. Febrero</th><th>Var.</th><th>Valor/Salida</th></tr></thead><tbody>';
  f.streaming.sort((a,b)=>b.inv_feb-a.inv_feb).forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    h+=`<tr class="${rc}"><td class="rank">${i+1}</td><td class="name">${p.nombre}</td><td class="num">${fmtN(p.pnts_ene)}</td><td class="money">${fmt(p.inv_ene)}</td><td class="num">${fmtN(p.pnts_feb)}</td><td class="money">${fmt(p.inv_feb)}</td><td class="num">${fmtVar(p.var_inv)}</td><td class="money">${fmt(p.valor_salida)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';

  // Cable
  h+='<div class="section-title"><div class="icon cable">C</div>Cable — Segundos</div>';
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Comparación Enero vs Febrero 2026</div><span class="card-cnt">'+f.cable.length+' canales</span></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Canal</th><th>Seg. Ene</th><th>Inv. Enero</th><th>Seg. Feb</th><th>Inv. Febrero</th><th>Var.</th><th>$/Segundo</th></tr></thead><tbody>';
  f.cable.sort((a,b)=>b.inv_feb-a.inv_feb).forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    h+=`<tr class="${rc}"><td class="rank">${i+1}</td><td class="name">${p.nombre}</td><td class="num">${fmtN(p.seg_ene)}</td><td class="money">${fmt(p.inv_ene)}</td><td class="num">${fmtN(p.seg_feb)}</td><td class="money">${fmt(p.inv_feb)}</td><td class="num">${fmtVar(p.var_inv)}</td><td class="money">${fmt(p.valor_seg)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';

  // Radios
  h+='<div class="section-title"><div class="icon radio">R</div>Radios — Segundos</div>';
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Comparación Enero vs Febrero 2026</div><span class="card-cnt">'+f.radios.length+' radios</span></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Radio</th><th>$/Seg Ene</th><th>Seg. Ene</th><th>Inv. Enero</th><th>$/Seg Feb</th><th>Seg. Feb</th><th>Inv. Febrero</th><th>Var.</th></tr></thead><tbody>';
  f.radios.sort((a,b)=>b.inv_feb-a.inv_feb).forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    h+=`<tr class="${rc}"><td class="rank">${i+1}</td><td class="name">${p.nombre}</td><td class="money">${fmt(p.costo_seg_ene)}</td><td class="num">${fmtN(p.seg_ene)}</td><td class="money">${fmt(p.inv_ene)}</td><td class="money">${fmt(p.costo_seg_feb)}</td><td class="num">${fmtN(p.seg_feb)}</td><td class="money">${fmt(p.inv_feb)}</td><td class="num">${fmtVar(p.var_inv)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';

  document.getElementById('tc-costos').innerHTML=h;
}

function buildMonitorTV(){
  const d=DATA.monitor_tv;
  let h='<div class="section-title"><div class="icon tv">TV</div>Monitor TV Aire — Avisos por Programa (Ene-Feb 2026)</div>';
  
  // KPIs
  const totalAvisos=d.reduce((s,p)=>s+p.avisos,0);
  const totalSeg=d.reduce((s,p)=>s+p.seg,0);
  h+='<div class="kpi-grid">';
  h+=`<div class="kpi-card"><div class="kpi-label">Total Avisos</div><div class="kpi-value">${fmtN(totalAvisos)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Total Segundos</div><div class="kpi-value">${fmtN(totalSeg)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Programas</div><div class="kpi-value">${d.length}</div></div>`;
  h+='</div>';

  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Ranking por cantidad de avisos</div></div>';
  h+='<div class="search-w"><input placeholder="Buscar programa..." oninput="filterTable(\'tb-montv\',this.value)"></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Programa</th><th>Avisos</th><th>Segundos</th><th>Días</th></tr></thead><tbody id="tb-montv">';
  d.forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    h+=`<tr class="${rc}"><td class="rank">${i+1}</td><td class="name">${p.programa}</td><td class="num">${fmtN(p.avisos)}</td><td class="num">${fmtN(p.seg)}</td><td class="num">${p.dias}</td></tr>`;
  });
  h+='</tbody></table></div></div>';
  document.getElementById('tc-monitor-tv').innerHTML=h;
}

function buildMonitorCable(){
  const d=DATA.monitor_cable;
  const channels=Object.entries(d).sort((a,b)=>b[1].total_avisos-a[1].total_avisos);
  
  let h='<div class="section-title"><div class="icon cable">C</div>Monitor TV Cable — Avisos por Canal y Programa (Ene-Feb 2026)</div>';
  
  const totalAvisos=channels.reduce((s,c)=>s+c[1].total_avisos,0);
  h+='<div class="kpi-grid">';
  h+=`<div class="kpi-card"><div class="kpi-label">Total Avisos</div><div class="kpi-value">${fmtN(totalAvisos)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Canales</div><div class="kpi-value">${channels.length}</div></div>`;
  h+='</div>';

  channels.forEach(([name,data])=>{
    const rows=data.programs.map((p,i)=>`<tr><td class="pr">${i+1}</td><td>${p.programa}</td><td class="pa">${fmtN(p.avisos)} avisos</td><td class="pa">${fmtN(p.seg)} seg</td></tr>`).join('');
    h+=`<div class="mon-group"><div class="mon-hdr" onclick="toggleMon(this.parentElement)"><div><div class="mon-name">${name}</div><div class="mon-stats"><span>${fmtN(data.total_avisos)} avisos</span><span>${fmtN(data.total_seg)} seg</span></div></div><span class="mon-tog">&#9660;</span></div><div class="mon-body"><table class="mon-tbl">${rows}</table></div></div>`;
  });
  document.getElementById('tc-monitor-cable').innerHTML=h;
}

function buildMonitorRadios(){
  const d=DATA.monitor_radios;
  const stations=Object.entries(d).sort((a,b)=>b[1].total_avisos-a[1].total_avisos);
  
  let h='<div class="section-title"><div class="icon radio">R</div>Monitor Radios — Avisos por Emisora y Programa (Ene-Feb 2026)</div>';
  
  const totalAvisos=stations.reduce((s,c)=>s+c[1].total_avisos,0);
  h+='<div class="kpi-grid">';
  h+=`<div class="kpi-card"><div class="kpi-label">Total Avisos</div><div class="kpi-value">${fmtN(totalAvisos)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Emisoras</div><div class="kpi-value">${stations.length}</div></div>`;
  h+='</div>';

  stations.forEach(([name,data])=>{
    const rows=data.programs.map((p,i)=>`<tr><td class="pr">${i+1}</td><td>${p.programa}</td><td class="pa">${fmtN(p.avisos)} avisos</td><td class="pa">${fmtN(p.seg)} seg</td></tr>`).join('');
    h+=`<div class="mon-group"><div class="mon-hdr" onclick="toggleMon(this.parentElement)"><div><div class="mon-name">${name}</div><div class="mon-stats"><span>${fmtN(data.total_avisos)} avisos</span><span>${fmtN(data.total_seg)} seg</span></div></div><span class="mon-tog">&#9660;</span></div><div class="mon-body"><table class="mon-tbl">${rows}</table></div></div>`;
  });
  document.getElementById('tc-monitor-radios').innerHTML=h;
}

// Auth
const ALLOWED_EMAILS=['mburlet@kuarzo.com','ffalce@kuarzo.com','martink@kuarzo.com','matiask@kuarzo.com','hkweller@kuarzo.com'];
function handleGoogleLogin(response){
  const payload=JSON.parse(atob(response.credential.split('.')[1]));
  const email=payload.email.toLowerCase();
  if(ALLOWED_EMAILS.includes(email)){
    sessionStorage.setItem('rkAuth',email);
    sessionStorage.setItem('rkName',payload.name||email);
    showContent();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
function showContent(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainContent').style.display='block';
  buildCostos();
  buildMonitorTV();
  buildMonitorCable();
  buildMonitorRadios();
}
if(ALLOWED_EMAILS.includes(sessionStorage.getItem('rkAuth'))){showContent()}
