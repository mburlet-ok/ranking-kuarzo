<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturación Medios — Kuarzo</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#f5f7fa;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;--accent:#4f6ef7;--accent2:#7c3aed;--text:#1a202c;--muted:#64748b;--green:#10b981;--red:#ef4444;--gold:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#ffffff,#f0f4ff 50%,#f5f0ff);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:var(--accent);text-decoration:none;font-size:.82rem;font-weight:600}
.header a:hover{text-decoration:underline}
.tabs{display:flex;gap:3px;padding:14px 32px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:9px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text);background:#f8fafc}
.tab.active{color:var(--accent2);background:var(--bg);border-color:var(--border)}
.content{padding:24px 32px;max-width:1440px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block}
.section-title{font-size:1rem;font-weight:700;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700}
.icon.tv{background:#3b82f6}.icon.stream{background:#8b5cf6}.icon.cable{background:#06b6d4}.icon.radio{background:#f59e0b}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:18px}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:.85rem;font-weight:700}
.card-cnt{font-size:.72rem;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:10px}
.search-w{padding:8px 14px;border-bottom:1px solid var(--border)}
.search-w input{width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:.82rem;outline:none}
.search-w input:focus{border-color:var(--accent)}
.tw{overflow-y:auto;max-height:500px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead th{position:sticky;top:0;background:#f8fafc;padding:7px 12px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;cursor:pointer}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(79,110,247,.04)}
tbody td{padding:6px 12px}
td.name{font-weight:500}td.num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
td.money{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--green)}
td.rank{font-weight:700;color:var(--accent);width:30px}
tr.r1 td.rank{color:var(--gold)}tr.r2 td.rank{color:var(--muted)}tr.r3 td.rank{color:#b45309}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:1.1rem;font-weight:700}
.mon-group{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mon-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.mon-hdr:hover{background:rgba(79,110,247,.04)}
.mon-name{font-weight:700;font-size:.82rem}
.mon-stats{font-size:.75rem;color:var(--muted);display:flex;gap:12px}
.mon-tog{color:var(--muted);font-size:.65rem;transition:transform .2s}
.mon-group.open .mon-tog{transform:rotate(180deg)}
.mon-body{display:none;border-top:1px solid var(--border)}
.mon-group.open .mon-body{display:block}
.mon-tbl{width:100%;border-collapse:collapse;font-size:.75rem}
.mon-tbl tr{border-bottom:1px solid var(--border)}.mon-tbl tr:last-child{border:none}
.mon-tbl td{padding:5px 14px}
.mon-tbl td.pr{width:24px;color:var(--accent);font-weight:700}
.mon-tbl td.pa{text-align:right;color:var(--muted);font-weight:600}
.toggle-group{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.toggle-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:.78rem;font-weight:600;background:var(--card);color:var(--muted);transition:all .2s}
.toggle-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:90%;max-width:420px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
</style>
</head>

const fmt=n=>{if(n>=1e9)return '$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return '$'+(n/1e3).toFixed(0)+'K';return '$'+Math.round(n).toLocaleString('es-AR')};
const fmtN=n=>n.toLocaleString('es-AR');
const fmtVar=v=>{if(!v)return '-';const c=v>0?'var(--green)':v<0?'var(--red)':'var(--muted)';const s=v>0?'+':'';return `<span style="color:${c};font-weight:600">${s}${v}%</span>`};

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',
    (id==='tv'&&t.textContent.includes('TV Aire'))||(id==='streaming'&&t.textContent.includes('Streaming'))||(id==='cable'&&t.textContent.includes('Cable'))||(id==='radios'&&t.textContent.includes('Radios'))
  ));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tc-'+id));
}
function toggleMon(el){el.classList.toggle('open')}
function filterT(id,q){const tb=document.getElementById(id);if(!tb)return;q=q.toLowerCase();Array.from(tb.rows).forEach(r=>{r.style.display=r.cells[1].textContent.toLowerCase().includes(q)?'':'none'})}

function buildTV(){
  const d=DATA.tv;
  let totalEne=0,totalFeb=0;
  d.forEach(p=>{totalEne+=p.ene_inv;totalFeb+=p.feb_inv});
  const varTotal=totalEne?((totalFeb-totalEne)/totalEne*100).toFixed(1):0;
  
  let h='<div class="section-title"><div class="icon tv">TV</div>TV por Programa — Comparación Enero vs Febrero 2026</div>';
  h+='<div class="kpi-grid">';
  h+=`<div class="kpi-card"><div class="kpi-label">Inv. Enero</div><div class="kpi-value">${fmt(totalEne)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Inv. Febrero</div><div class="kpi-value">${fmt(totalFeb)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Variación</div><div class="kpi-value">${fmtVar(parseFloat(varTotal))}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Programas</div><div class="kpi-value">${d.length}</div></div>`;
  h+='</div>';
  
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Inversión estimada = PNTs del monitor × costo por salida</div><span class="card-cnt">'+d.length+' programas</span></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Programa</th><th>$/Salida</th><th>PNTs Ene</th><th>Inv. Enero</th><th>PNTs Feb</th><th>Inv. Febrero</th><th>Var.</th></tr></thead><tbody id="tb-tv">';
  d.forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const noData=p.ene_cant===0&&p.feb_cant===0;
    const style=noData?' style="opacity:.5"':'';
    h+=`<tr class="${rc}"${style}><td class="rank">${i+1}</td><td class="name">${p.nombre}${noData?' <span style="font-size:.65rem;color:var(--red)">(sin monitor)</span>':''}</td><td class="money">${fmt(p.valor_salida)}</td><td class="num">${p.ene_cant?fmtN(p.ene_cant):'-'}</td><td class="money">${p.ene_inv?fmt(p.ene_inv):'-'}</td><td class="num">${p.feb_cant?fmtN(p.feb_cant):'-'}</td><td class="money">${p.feb_inv?fmt(p.feb_inv):'-'}</td><td class="num">${fmtVar(p.var)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';
  
  // Streaming
  h+='<div class="section-title"><div class="icon stream">S</div>Streaming — Costo por salida (sin datos de monitor)</div>';
  h+='<div class="card"><div class="tw"><table><thead><tr><th>#</th><th>Plataforma</th><th>Valor/Salida</th></tr></thead><tbody>';
  DATA.streaming.forEach((p,i)=>{
    h+=`<tr><td class="rank">${i+1}</td><td class="name">${p.nombre}</td><td class="money">${fmt(p.valor_salida)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';
  
  document.getElementById('tc-tv').innerHTML=h;
}

function buildCable(){

  const varTotal=totalEne?((totalFeb-totalEne)/totalEne*100).toFixed(1):0;
  
  let h='<div class="section-title"><div class="icon cable">C</div>TV Cable — Comparación Enero vs Febrero 2026</div>';
  h+='<div class="kpi-grid">';
  h+=`<div class="kpi-card"><div class="kpi-label">Inv. Enero</div><div class="kpi-value">${fmt(totalEne)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Inv. Febrero</div><div class="kpi-value">${fmt(totalFeb)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Variación</div><div class="kpi-value">${fmtVar(parseFloat(varTotal))}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Canales</div><div class="kpi-value">${d.length}</div></div>`;
  h+='</div>';
  
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Inversión estimada = Segundos del monitor × costo por segundo</div></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Canal</th><th>$/Seg</th><th>Seg. Ene</th><th>Inv. Enero</th><th>Seg. Feb</th><th>Inv. Febrero</th><th>Var.</th></tr></thead><tbody>';
  d.forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const noData=p.ene_seg===0&&p.feb_seg===0;
    h+=`<tr class="${rc}"${noData?' style="opacity:.5"':''}><td class="rank">${i+1}</td><td class="name">${p.nombre}${noData?' <span style="font-size:.65rem;color:var(--red)">(sin monitor)</span>':''}</td><td class="money">${fmt(p.valor_seg)}</td><td class="num">${p.ene_seg?fmtN(p.ene_seg):'-'}</td><td class="money">${p.ene_inv?fmt(p.ene_inv):'-'}</td><td class="num">${p.feb_seg?fmtN(p.feb_seg):'-'}</td><td class="money">${p.feb_inv?fmt(p.feb_inv):'-'}</td><td class="num">${fmtVar(p.var)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';
  document.getElementById('tc-cable').innerHTML=h;
}

function buildRadios(){
  const d=DATA.radios;
  let totalEne=0,totalFeb=0;
  d.forEach(p=>{totalEne+=p.ene_inv;totalFeb+=p.feb_inv});
  const varTotal=totalEne?((totalFeb-totalEne)/totalEne*100).toFixed(1):0;
  
  let h='<div class="section-title"><div class="icon radio">R</div>Radios — Comparación Enero vs Febrero 2026</div>';
  h+='<div class="kpi-grid">';

  h+=`<div class="kpi-card"><div class="kpi-label">Inv. Febrero</div><div class="kpi-value">${fmt(totalFeb)}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Variación</div><div class="kpi-value">${fmtVar(parseFloat(varTotal))}</div></div>`;
  h+=`<div class="kpi-card"><div class="kpi-label">Emisoras</div><div class="kpi-value">${d.length}</div></div>`;
  h+='</div>';
  
  h+='<div class="card"><div class="card-hdr"><div class="card-ttl">Inversión estimada = Segundos del monitor × costo por segundo</div></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Radio</th><th>$/Seg Ene</th><th>Seg. Ene</th><th>Inv. Enero</th><th>$/Seg Feb</th><th>Seg. Feb</th><th>Inv. Febrero</th><th>Var.</th></tr></thead><tbody>';
  d.forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const noData=p.ene_seg===0&&p.feb_seg===0;
    h+=`<tr class="${rc}"${noData?' style="opacity:.5"':''}><td class="rank">${i+1}</td><td class="name">${p.nombre}${noData?' <span style="font-size:.65rem;color:var(--red)">(sin monitor)</span>':''}</td><td class="money">${fmt(p.valor_seg_ene)}</td><td class="num">${p.ene_seg?fmtN(p.ene_seg):'-'}</td><td class="money">${p.ene_inv?fmt(p.ene_inv):'-'}</td><td class="money">${fmt(p.valor_seg_feb)}</td><td class="num">${p.feb_seg?fmtN(p.feb_seg):'-'}</td><td class="money">${p.feb_inv?fmt(p.feb_inv):'-'}</td><td class="num">${fmtVar(p.var)}</td></tr>`;
  });
  h+='</tbody></table></div></div>';
  document.getElementById('tc-radios').innerHTML=h;
}
