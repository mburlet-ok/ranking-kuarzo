<style>
:root{--bg:#f5f7fa;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;--accent:#4f6ef7;--accent2:#7c3aed;--gold:#f59e0b;--silver:#94a3b8;--bronze:#b45309;--text:#1a202c;--muted:#64748b;--green:#10b981;--red:#ef4444;--pink:#ec4899}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#ffffff,#f0f4ff 50%,#f5f0ff);border-bottom:1px solid var(--border);padding:22px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#4f6ef7,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:.83rem;margin-top:3px}
.header-right{display:flex;gap:8px}
.badge{padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:700}
.b-blue{background:var(--accent);color:#fff}.b-purple{background:var(--accent2);color:#fff}
.tabs{display:flex;gap:3px;padding:14px 32px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--card)}.tab.active{color:var(--accent);background:var(--bg);border-color:var(--border)}
.content{padding:24px 32px;max-width:1440px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi-card.gold::before{background:linear-gradient(90deg,#f59e0b,#f97316)}
.kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-value{font-size:1.35rem;font-weight:700}.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:3px}
.toggle-group{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.toggle-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:.8rem;font-weight:600;background:var(--card);color:var(--muted);transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toggle-group{display:none !important}
.toggle-label{color:var(--muted);font-size:.78rem;margin-right:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:6px}
.card-cnt{font-size:.72rem;color:var(--muted);background:var(--surface);padding:2px 8px;border-radius:10px}
.search-w{padding:10px 14px;border-bottom:1px solid var(--border)}
.search-w input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:.82rem;outline:none}
.search-w input:focus{border-color:var(--accent)}.search-w input::placeholder{color:var(--muted)}
.tw{overflow-y:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{position:sticky;top:0;background:#f8fafc;padding:8px 13px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(79,110,247,.06)}
tbody tr.clickable{cursor:pointer}
tbody tr.clickable:hover{background:rgba(79,110,247,.12)}
tbody td{padding:7px 13px}
td.rank{font-weight:700;color:var(--accent);width:34px}
td.name{font-weight:500}td.amount{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--green)}
td.bar-cell{width:100px;padding-right:12px}
.bar{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));min-width:2px}
tr.r1 td.rank{color:var(--gold)}tr.r2 td.rank{color:var(--silver)}tr.r3 td.rank{color:var(--bronze)}
.chart-c{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:22px}
.chart-c canvas{max-height:280px}
.chart-t{font-size:.88rem;font-weight:700;margin-bottom:12px}
.progs-hdr{font-size:.92rem;font-weight:700;margin-bottom:14px}
.progs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:22px}
.prog-c{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.prog-h{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.prog-h:hover{background:rgba(79,110,247,.08)}
.prog-n{font-weight:700;font-size:.8rem}.prog-t{font-size:.78rem;font-weight:600;color:var(--green)}
.prog-tog{color:var(--muted);font-size:.68rem;transition:transform .2s}
.prog-c.open .prog-tog{transform:rotate(180deg)}
.prog-b{display:none}.prog-c.open .prog-b{display:block}
.prog-tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.prog-tbl tr{border-bottom:1px solid var(--border)}.prog-tbl tr:last-child{border:none}
.prog-tbl td{padding:6px 15px}
.prog-tbl td.pr{width:26px;color:var(--accent);font-weight:700;font-size:.72rem}
.prog-tbl td.pa{text-align:right;color:var(--green);font-weight:600;font-variant-numeric:tabular-nums}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:90%;max-width:600px;max-height:80vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-hdr .mtotal{font-size:.85rem;color:var(--green);font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--surface);color:var(--text)}
.modal-body{overflow-y:auto;max-height:60vh;padding:0}
.modal-body table{width:100%;border-collapse:collapse;font-size:.83rem}
.modal-body thead th{position:sticky;top:0;background:#f8fafc;padding:10px 18px;text-align:left;font-size:.72rem;text-transform:uppercase;color:var(--muted);font-weight:600}
.modal-body tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.modal-body tbody tr:hover{background:rgba(79,110,247,.08)}
.modal-body td{padding:9px 18px}
.modal-body td.rank{font-weight:700;color:var(--accent);width:36px}
.modal-body td.amount{text-align:right;color:var(--green);font-weight:600;font-variant-numeric:tabular-nums}
.modal-body td.bar-cell{width:100px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.seller-tag{display:inline-block;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle;opacity:.85;background:rgba(79,110,247,.18);color:#a5b4fc;letter-spacing:.3px}
.seller-tag.s-fernando{background:rgba(79,110,247,.2);color:#93c5fd}
.seller-tag.s-mara{background:rgba(236,72,153,.2);color:#f9a8d4}
.seller-tag.s-maxi{background:rgba(16,185,129,.2);color:#6ee7b7}
.seller-tag.s-cynthia{background:rgba(245,158,11,.2);color:#fcd34d}
.seller-tag.s-isabel{background:rgba(124,58,237,.2);color:#c4b5fd}
.seller-tag.s-flor{background:rgba(239,68,68,.2);color:#fca5a5}
.seller-tag.s-ch-telefe{background:rgba(234,179,8,.15);color:#fde68a}
.seller-tag.s-ch-canal13{background:rgba(249,115,22,.15);color:#fdba74}
.seller-tag.s-ch-canal9{background:rgba(20,184,166,.15);color:#99f6e4}

.seller-tag.s-ch-america{background:rgba(168,85,247,.15);color:#d8b4fe}
</style>
</head>

let currentTabData = null;
let currentTabId = null;

// === MODAL ===
function openModal(title,items,subtitle){
  const m=document.getElementById('modal');
  document.getElementById('modal-title').innerHTML=title;
  const total=items.reduce((s,i)=>s+i.amount,0);
  let h=`<table><thead><tr><th>#</th><th>Nombre</th><th>Inversion</th><th>%</th></tr></thead><tbody>`;
  items.forEach((it,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const clickable=it.drilldown?'clickable':'';
    const onclick=it.drilldown?`onclick="drilldown('${escape(it.drilldown)}','${escape(it.name)}')"`:''
    h+=`<tr class="${rc} ${clickable}" ${onclick}><td class="rank">${i+1}</td><td class="name">${it.name}</td><td class="amount">${fmt(it.amount)}</td><td class="bar-cell">${pct(it.amount,total)}</td></tr>`;
  });
  h+=`</tbody></table>`;
  document.getElementById('modal-body').innerHTML=h;
  m.classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function escape(s){return s.replace(/'/g,"\\'")}

function drilldown(type,name){
  name=unescape(name);type=unescape(type);
  const d=currentTabData;if(!d)return;
  if(type==='client_programs'){
    const cp=d.client_programs||{};
    const items=cp[name]||[];
    if(items.length){
      openModal(`<span style="color:var(--green)">&#9654;</span> ${name} <span style="font-size:.75rem;color:var(--muted);margin-left:8px">Programas</span>`,
        items.map(x=>({...x,drilldown:null})));
    }
  } else if(type==='vendor_clients'){
    const vc=d.vendor_clients||{};
    const items=vc[name]||[];
    if(items.length){
      openModal(`<span style="color:var(--accent2)">&#9654;</span> ${name} <span style="font-size:.75rem;color:var(--muted);margin-left:8px">Clientes</span>`,
        items.map(x=>({...x,drilldown:'client_programs'})));
    }
  }
}

// === TABLE HELPERS ===
function buildRows(data,tbodyId,total,drilldownType){
  const tb=document.getElementById(tbodyId);if(!tb)return;tb.innerHTML='';
  const d=currentTabData||{};
  const drillMap=drilldownType==='client_programs'?(d.client_programs||{}):drilldownType==='vendor_clients'?(d.vendor_clients||{}):{};
  data.forEach((item,i)=>{const r=i+1;const rc=r==1?'r1':r==2?'r2':r==3?'r3':'';
    const hasDrill=drilldownType&&drillMap[item.name]&&drillMap[item.name].length>0;
    const click=hasDrill?`class="${rc} clickable" onclick="drilldown('${drilldownType}','${escape(item.name)}')"`:` class="${rc}"`;
    const seller=SELLER_MAP[item.name];
    const channel=!seller?CHANNEL_MAP[item.name]:null;
    const sellerCls=seller?'s-'+seller.toLowerCase().split('/')[0].trim().replace(/\s+/g,''):'';
    const channelCls=channel?'s-ch-'+channel.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,''):'';
    const tag=seller?`<span class="seller-tag ${sellerCls}">${seller}</span>`:channel?`<span class="seller-tag ${channelCls}">${channel}</span>`:'';
    tb.innerHTML+=`<tr ${click}><td class="rank">${r}</td><td class="name">${item.name}${tag}</td><td class="amount">${fmt(item.amount)}</td><td class="bar-cell">${pct(item.amount,total)}</td></tr>`;
  });
}
function filterT(id,q){const tb=document.getElementById(id);if(!tb)return;q=q.toLowerCase();Array.from(tb.rows).forEach(r=>{r.style.display=r.cells[1].textContent.toLowerCase().includes(q)?'':'none'})}
function sortT(id,col,type){const tb=document.getElementById(id);if(!tb)return;const rows=Array.from(tb.rows);const dir=tb.dataset.sd==='a'?-1:1;tb.dataset.sd=dir===1?'a':'d';
  rows.sort((a,b)=>{let av=a.cells[col].textContent.replace(/[$,.\s]/g,''),bv=b.cells[col].textContent.replace(/[$,.\s]/g,'');
    if(type==='n')return dir*((parseFloat(bv)||0)-(parseFloat(av)||0));return dir*av.localeCompare(bv,'es')});
  rows.forEach(r=>tb.appendChild(r));
}
function toggleP(el){el.classList.toggle('open')}

function buildProgGrid(programs,gridId){
  const g=document.getElementById(gridId);if(!g)return;g.innerHTML='';
  const sorted=Object.entries(programs).sort((a,b)=>(b[1].total||0)-(a[1].total||0));
  sorted.forEach(([name,data])=>{
    const total=data.total?fmt(data.total):(data.clients||data).length?fmt((data.clients||data).reduce((s,c)=>s+c.amount,0)):'-';
    const clients=data.clients||data;
    const rows=clients.map((c,i)=>`<tr><td class="pr">${i+1}</td><td>${c.name}</td><td class="pa">${fmt(c.amount)}</td></tr>`).join('');
    g.innerHTML+=`<div class="prog-c"><div class="prog-h" onclick="toggleP(this.parentElement)"><div><div class="prog-n">${name}</div><div class="prog-t">${total}</div></div><span class="prog-tog">&#9660;</span></div><div class="prog-b"><table class="prog-tbl">${rows}</table></div></div>`;
  });
}

  let h='';
  h+='<span style="color:var(--accent);font-size:.7rem;font-weight:700;padding:9px 10px;letter-spacing:1px">2026</span>';
  ALL_TABS.filter(t=>t.group==='2026').forEach((t,i)=>{
    h+=`<div class="tab${i===0?' active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</div>`;
  });
  h+='<span style="color:var(--border);padding:4px 6px;font-size:1.2rem">|</span>';
  h+='<span style="color:var(--accent2);font-size:.7rem;font-weight:700;padding:9px 10px;letter-spacing:1px">2025</span>';

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tc-'+id));

}

function monthSection(id,label,hasGH){
  let h='';

    h+=`<div class="kpi-card"><div class="kpi-label">Inversion Total</div><div class="kpi-value" id="${id}-tc"></div><div class="kpi-sub">${label}</div></div>`;

    h+=`<div class="kpi-card"><div class="kpi-label">Inversion Total</div><div class="kpi-value" id="${id}-tt"></div><div class="kpi-sub">${label}</div></div>`;
  }
  h+=`<div class="kpi-card"><div class="kpi-label">N Clientes</div><div class="kpi-value" id="${id}-nc"></div></div>`;
  h+=`<div class="kpi-card gold"><div class="kpi-label">Top Anunciante</div><div class="kpi-value" id="${id}-t1" style="font-size:.9rem"></div><div class="kpi-sub" id="${id}-t1a"></div></div>`;

  h+=`</div>`;
  h+=`<div class="chart-c"><div class="chart-t">Top 10 Anunciantes — ${label}</div><canvas id="ch-${id}"></canvas></div>`;
  h+=`<div class="grid2">`;
  h+=`<div class="card"><div class="card-hdr"><div class="card-ttl">Ranking Anunciantes <span style="font-size:.7rem;color:var(--pink)">click para detalle</span></div><span class="card-cnt" id="${id}-cc"></span></div><div class="search-w"><input placeholder="Buscar anunciante..." oninput="filterT('${id}-ct',this.value)"></div><div class="tw"><table><thead><tr><th onclick="sortT('${id}-ct',0,'n')">#</th><th onclick="sortT('${id}-ct',1,'s')">Anunciante</th><th onclick="sortT('${id}-ct',2,'n')">Inversion</th><th>%</th></tr></thead><tbody id="${id}-ct"></tbody></table></div></div>`;
  h+=`<div class="card"><div class="card-hdr"><div class="card-ttl">Ranking Vendedores <span style="font-size:.7rem;color:var(--pink)">click para detalle</span></div><span class="card-cnt" id="${id}-sc"></span></div><div class="search-w"><input placeholder="Buscar vendedor..." oninput="filterT('${id}-st',this.value)"></div><div class="tw"><table><thead><tr><th onclick="sortT('${id}-st',0,'n')">#</th><th onclick="sortT('${id}-st',1,'s')">Vendedor</th><th onclick="sortT('${id}-st',2,'n')">Inversion</th><th>%</th></tr></thead><tbody id="${id}-st"></tbody></table></div></div>`;
  h+=`</div>`;
  h+=`<div><div class="progs-hdr">Inversion por Programa — ${label}</div><div class="progs-grid" id="${id}-pg"></div></div>`;
  return h;
}

const views={};
function setV(id,v){views[id]=v;
  const tabId=id.replace('y25a','y25a').replace('y25_','y25_').replace('en26','en26').replace('feb26','feb26').replace('mar26','mar26').replace('abr26','abr26').replace('acu26','acu26');
  document.querySelectorAll(`#tc-${tabId} .toggle-btn`).forEach((b,i)=>b.classList.toggle('active',(i===0&&v==='con')||(i===1&&v==='sin')));
  initTabData(id);
}

function getTabDataObj(id){
  if(id==='y25a')return DATA.y25_annual;
  if(id.startsWith('y25_'))return DATA.y25_months[id.replace('y25_','')];
  if(id==='en26')return DATA.enero;
  if(id==='feb26')return DATA.febrero;
  if(id==='mar26')return DATA.marzo;
  if(id==='abr26')return DATA.abril;
  if(id==='acu26')return DATA.acumulado26;
  return null;
}

function initTabData(id){
  if(id==='evo'){renderEvo();return}
  if(id==='mktdig'){renderMktDig();return}
  const d=getTabDataObj(id);if(!d)return;
  currentTabData=d;currentTabId=id;
  const hasGH=!!d.con_gh;
  const v=views[id]||'con';
  let clients,total;
  if(hasGH){
    clients=(v==='con'?d.con_gh:(d.sin_gh||[])).sort((a,b)=>b.amount-a.amount);
    total=v==='con'?(d.total_con||0):(d.total_sin||0);
    const e1=document.getElementById(id+'-tc');if(e1)e1.textContent=fmtAuto(d.total_con);
    const e2=document.getElementById(id+'-ts');if(e2)e2.textContent=fmtAuto(d.total_sin);
  } else {
    clients=(d.general||d.con_gh||[]).sort((a,b)=>b.amount-a.amount);
    total=d.total||d.total_con||0;
    const e=document.getElementById(id+'-tt');if(e)e.textContent=fmtAuto(total);
  }
  const sellers=(d.sellers||[]).sort((a,b)=>b.amount-a.amount);
  const programs=d.programs||d.programs_detail||{};
  const e=id=>document.getElementById(id);
  if(e(id+'-nc'))e(id+'-nc').textContent=clients.length;
  if(e(id+'-np'))e(id+'-np').textContent=Object.keys(programs).length;
  if(clients[0]){if(e(id+'-t1'))e(id+'-t1').textContent=clients[0].name;if(e(id+'-t1a'))e(id+'-t1a').textContent=fmt(clients[0].amount)}
  if(sellers[0]){if(e(id+'-t2'))e(id+'-t2').textContent=sellers[0].name;if(e(id+'-t2a'))e(id+'-t2a').textContent=fmt(sellers[0].amount)}
  if(document.getElementById(id+'-cc'))document.getElementById(id+'-cc').textContent=clients.length+' anunciantes';
  if(document.getElementById(id+'-sc'))document.getElementById(id+'-sc').textContent=sellers.length+' vendedores';
  const hasDrillClients=d.client_programs&&Object.keys(d.client_programs).length>0;
  const hasDrillVendors=d.vendor_clients&&Object.keys(d.vendor_clients).length>0;
  buildRows(clients,id+'-ct',total,hasDrillClients?'client_programs':null);
  buildRows(sellers,id+'-st',total,hasDrillVendors?'vendor_clients':null);
  buildProgGrid(programs,id+'-pg');
  const top10=clients.slice(0,10);
  makeBar('ch-'+id,top10.map(x=>x.name),top10.map(x=>x.amount));
}

function renderEvo(){
  const e25=DATA.evo_2025,e26=DATA.evo_2026;
  const t25=e25.reduce((s,x)=>s+x.total,0),t26=e26.reduce((s,x)=>s+x.total,0);
  document.getElementById('evo-25').textContent=fmtB(t25);
  document.getElementById('evo-26').textContent=fmtB(t26);
  document.getElementById('evo-avg25').textContent=fmtM(t25/12);
  document.getElementById('evo-avg26').textContent=fmtM(t26/e26.length);
  makeBar('ch-evo25',e25.map(x=>x.mes),e25.map(x=>x.total),e25.map((_,i)=>`hsl(${250+i*8},60%,55%)`));
  makeBar('ch-evo26',e26.map(x=>x.mes),e26.map(x=>x.total),['#4f6ef7','#7c3aed','#ec4899','#f59e0b']);
  const hues=[210,250,290,330,15,50,90,130,170,190];
  // 2025 client evo
  const ce25=DATA.client_evo_25;
  const ds25=Object.entries(ce25).map(([name,data],i)=>({label:name,data:MONTHS_ES.map(m=>data[m]||0),borderColor:`hsl(${hues[i]},70%,55%)`,backgroundColor:`hsla(${hues[i]},70%,55%,.1)`,tension:.3,fill:false,borderWidth:2,pointRadius:3}));
  makeLine('ch-evo25c',MONTHS_SHORT,ds25);
  // 2026 client evo
  const ce26=DATA.client_evo_26;
  const ds26=Object.entries(ce26).map(([name,data],i)=>({label:name,data:['ENERO','FEBRERO','MARZO','ABRIL'].map(m=>data[m]||0),borderColor:`hsl(${hues[i]},70%,55%)`,backgroundColor:`hsla(${hues[i]},70%,55%,.1)`,tension:.3,fill:false,borderWidth:2,pointRadius:4}));
  makeLine('ch-evo26c',['ENE','FEB','MAR','ABR'],ds26);
}

buildTabs();
buildContent();
initTabData('acu26');

}

}
